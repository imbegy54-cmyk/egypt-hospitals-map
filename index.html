<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة مستشفيات مصر</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* =============================================
           تنسيق الكارت المتطور
           ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .details-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            border-radius: 20px;
            z-index: 9999;
            width: 92%;
            max-width: 750px;
            max-height: 90vh;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .details-popup-header {
            background: linear-gradient(135deg, #1a3a5c, #2c7fb8);
            color: white;
            padding: 25px 30px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .details-popup-header h2 {
            font-size: 26px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .details-popup-header .hospital-icon {
            font-size: 32px;
        }

        .details-popup-header .close-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .details-popup-header .close-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(90deg);
        }

        .details-popup-body {
            padding: 20px 25px;
            max-height: calc(90vh - 100px);
            overflow-y: auto;
            background: #f8fafc;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: #f8fafc;
            padding: 10px 0;
            z-index: 5;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            background: #e8ecf1;
            color: #4a5568;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: #d0d7e2;
        }

        .tab-btn.active {
            background: #2c7fb8;
            color: white;
            box-shadow: 0 4px 15px rgba(44, 127, 184, 0.4);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-card {
            background: white;
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-right: 4px solid #2c7fb8;
        }

        .info-card .label {
            font-size: 13px;
            color: #7a8a9e;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-card .value {
            font-size: 16px;
            color: #1a202c;
            font-weight: 500;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .data-table th {
            background: #2c7fb8;
            color: white;
            padding: 12px 15px;
            text-align: right;
            font-weight: 600;
            font-size: 13px;
        }

        .data-table td {
            padding: 10px 15px;
            border-bottom: 1px solid #edf2f7;
            color: #2d3748;
        }

        .data-table tr:hover td {
            background: #f7fafc;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #c6f6d5;
            color: #276749;
        }

        .badge-danger {
            background: #fed7d7;
            color: #9b2c2c;
        }

        .badge-warning {
            background: #fefcbf;
            color: #975a16;
        }

        .badge-info {
            background: #bee3f8;
            color: #2a69ac;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin: 10px 0;
        }

        .stat-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: 0.3s;
        }

        .stat-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-item .icon {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .stat-item .number {
            font-size: 22px;
            font-weight: 700;
            color: #1a3a5c;
        }

        .stat-item .stat-label {
            font-size: 12px;
            color: #7a8a9e;
        }

        .contract-item {
            background: white;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .contract-item .name {
            font-weight: 500;
            color: #2d3748;
        }

        .contract-item .date {
            font-size: 13px;
            color: #718096;
        }

        .details-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 9998;
            animation: fadeOverlay 0.3s ease;
        }

        @keyframes fadeOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 15px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #2c7fb8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .details-popup {
                width: 96%;
                max-height: 95vh;
            }

            .details-popup-header h2 {
                font-size: 20px;
            }

            .tabs {
                gap: 5px;
            }

            .tab-btn {
                padding: 8px 14px;
                font-size: 12px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .data-table {
                font-size: 12px;
            }

            .data-table th,
            .data-table td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script>
        // =============================================
        // المتغيرات العامة
        // =============================================
        let map = null;
        let markersLayer = null;
        let hospitalData = null;

        // =============================================
        // تهيئة الخريطة
        // =============================================
        function initMap() {
            map = L.map('map').setView([26.8, 30.8], 6);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            markersLayer = L.layerGroup().addTo(map);
        }

        // =============================================
        // تحميل البيانات الأساسية
        // =============================================
        async function loadBasicData() {
            try {
                showLoadingMessage('جاري تحميل بيانات المستشفيات...');
                
                // استخدام المسار النسبي لـ Vercel
                const response = await fetch('/api/hospitals');
                if (!response.ok) throw new Error('فشل تحميل البيانات');
                
                hospitalData = await response.json();
                hideLoadingMessage();
                
                console.log('✅ تم تحميل البيانات:', hospitalData);
                showGovernorates();
                
            } catch (error) {
                hideLoadingMessage();
                alert('⚠️ فشل تحميل البيانات. تأكد من تشغيل السيرفر.');
            }
        }

        // =============================================
        // جلب تفاصيل مستشفى
        // =============================================
        async function loadHospitalDetails(sheetId) {
            try {
                // استخدام المسار النسبي لـ Vercel
                const response = await fetch(`/api/hospital/${sheetId}`);
                if (!response.ok) throw new Error('فشل تحميل التفاصيل');
                return await response.json();
            } catch (error) {
                console.error('❌ فشل تحميل التفاصيل:', error);
                return null;
            }
        }

        // =============================================
        // عرض المحافظات
        // =============================================
        function showGovernorates() {
            if (!hospitalData) return;
            
            markersLayer.clearLayers();
            document.querySelectorAll('.custom-return-btn').forEach(el => el.remove());
            
            hospitalData.محافظات.forEach(gov => {
                const marker = L.marker([gov.مركز[0], gov.مركز[1]], {
                    icon: L.divIcon({
                        className: 'gov-marker',
                        html: `<div style="background:linear-gradient(135deg,#c0392b,#e74c3c); color:white; padding:10px 18px; border-radius:30px; font-weight:bold; border:3px solid white; box-shadow:0 4px 20px rgba(192,57,43,0.4);">🏛️ ${gov.اسم}</div>`,
                        iconSize: [120, 50],
                        iconAnchor: [60, 25]
                    })
                });
                
                marker.bindPopup(`
                    <div style="text-align:center; min-width:180px; padding:5px;">
                        <h3 style="color:#2c3e50; font-size:22px; margin:0 0 8px 0;">🏛️ ${gov.اسم}</h3>
                        <p style="font-size:18px; color:#555; margin:0 0 10px 0;">🏥 <strong>${gov.مستشفيات.length}</strong> مستشفى</p>
                        <button onclick="showHospitals('${gov.اسم}')" style="padding:12px 30px; background:linear-gradient(135deg,#2980b9,#3498db); color:white; border:none; border-radius:12px; cursor:pointer; font-size:16px; font-weight:600; box-shadow:0 4px 15px rgba(41,128,185,0.4); transition:0.3s;">
                            📋 عرض المستشفيات
                        </button>
                    </div>
                `);
                
                markersLayer.addLayer(marker);
            });
            
            map.flyTo([26.8, 30.8], 6);
        }

        // =============================================
        // عرض مستشفيات محافظة
        // =============================================
        function showHospitals(govName) {
            const gov = hospitalData.محافظات.find(g => g.اسم === govName);
            if (!gov) return;
            
            markersLayer.clearLayers();
            document.querySelectorAll('.custom-return-btn').forEach(el => el.remove());
            
            const returnBtn = L.control({ position: 'topright' });
            returnBtn.onAdd = function() {
                const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control custom-return-btn');
                div.innerHTML = `<button onclick="showGovernorates()" style="padding:10px 20px; background:#2c3e50; color:white; border:none; border-radius:12px; cursor:pointer; font-size:15px; font-weight:600; box-shadow:0 4px 15px rgba(0,0,0,0.2); transition:0.3s;">
                    🏠 رجوع للمحافظات
                </button>`;
                return div;
            };
            returnBtn.addTo(map);
            
            gov.مستشفيات.forEach(hospital => {
                const marker = L.marker([hospital.خط_العرض, hospital.خط_الطول], {
                    icon: L.divIcon({
                        className: 'hospital-marker',
                        html: `<div style="background:linear-gradient(135deg,#3498db,#2ecc71); color:white; padding:8px 12px; border-radius:20px; font-size:18px; border:3px solid white; box-shadow:0 4px 15px rgba(52,152,219,0.4);">🏥</div>`,
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    })
                });
                
                marker.bindPopup(`
                    <div style="min-width:280px; padding:15px; font-family:'Segoe UI',sans-serif; direction:rtl;">
                        <h3 style="color:#1a3a5c; font-size:20px; margin:0 0 5px 0;">🏥 ${hospital.اسم}</h3>
                        <hr style="margin:10px 0; border:0; border-top:2px solid #e8ecf1;">
                        <p style="margin:5px 0; color:#4a5568; font-size:14px;">
                            📍 ${hospital.خط_العرض}, ${hospital.خط_الطول}
                        </p>
                        <button onclick="showFullDetails('${hospital.sheet_id}', '${hospital.اسم}')" 
                                style="width:100%; padding:12px; background:linear-gradient(135deg,#27ae60,#2ecc71); color:white; border:none; border-radius:12px; cursor:pointer; font-size:15px; font-weight:600; margin-top:10px; box-shadow:0 4px 15px rgba(46,204,113,0.3); transition:0.3s;">
                            📋 عرض التفاصيل الكاملة
                        </button>
                    </div>
                `);
                
                markersLayer.addLayer(marker);
            });
            
            map.flyTo([gov.مركز[0], gov.مركز[1]], 10);
        }

        // =============================================
        // عرض التفاصيل الكاملة - تصميم متطور
        // =============================================
        async function showFullDetails(sheetId, hospitalName) {
            if (!sheetId || sheetId === '') {
                alert('⚠️ لا توجد تفاصيل إضافية لهذا المستشفى');
                return;
            }
            
            // عرض رسالة تحميل
            showLoadingPopup(hospitalName);
            
            const details = await loadHospitalDetails(sheetId);
            
            // إخفاء رسالة التحميل
            document.querySelector('.loading-popup')?.remove();
            document.getElementById('loading-overlay')?.remove();
            
            if (!details || details.error) {
                alert('⚠️ فشل تحميل تفاصيل المستشفى');
                return;
            }
            
            console.log('📋 التفاصيل المستلمة:', details);
            
            // بناء الكارت المتطور
            buildAdvancedCard(hospitalName, details);
        }

        // =============================================
        // عرض رسالة تحميل
        // =============================================
        function showLoadingPopup(hospitalName) {
            const overlay = document.createElement('div');
            overlay.className = 'details-overlay';
            overlay.id = 'loading-overlay';
            
            const popup = document.createElement('div');
            popup.className = 'details-popup loading-popup';
            popup.innerHTML = `
                <div class="details-popup-header">
                    <h2><span class="hospital-icon">🏥</span> ${hospitalName}</h2>
                </div>
                <div class="details-popup-body">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p style="color:#4a5568; font-size:16px;">جاري تحميل بيانات المستشفى...</p>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            document.body.appendChild(popup);
        }

        // =============================================
        // بناء الكارت المتطور
        // =============================================
        function buildAdvancedCard(hospitalName, details) {
            // إزالة أي كارت قديم
            document.querySelector('.details-popup')?.remove();
            document.querySelector('.details-overlay')?.remove();
            
            // =============================================
            // تحليل البيانات بأمان
            // =============================================
            
            // دالة مساعدة لاستخراج البيانات بأمان
            function safeGet(data, key, fallback) {
                if (!data) return fallback;
                if (Array.isArray(data) && data.length === 0) return fallback;
                if (data[key] !== undefined && data[key] !== null) return data[key];
                return fallback;
            }
            
            // دالة للتأكد من أن البيانات مصفوفة
            function safeArray(data) {
                if (Array.isArray(data) && data.length > 0) return data;
                return [];
            }
            
            // استخراج البيانات بأمان
            const adminData = safeArray(details.الهيكل_الاداري);
            const headsData = safeArray(details.رؤساء_الاقسام);
            const committeesData = safeArray(details.اللجان);
            const systemsData = safeArray(details.انظمة_التشغيل);
            const staffData = safeArray(details.القوة_البشرية);
            const contractsData = safeArray(details.التعاقدات);
            const gasData = safeArray(details.شبكة_الغازات);
            const creditsData = safeArray(details.الاعتمادات);
            
            console.log('📊 البيانات المحللة:', {
                admin: adminData.length,
                heads: headsData.length,
                committees: committeesData.length,
                systems: systemsData.length,
                staff: staffData.length,
                contracts: contractsData.length,
                gas: gasData.length,
                credits: creditsData.length
            });
            
            // =============================================
            // دوال مساعدة لاستخراج الأرقام
            // =============================================
            function extractNumber(data, keyword) {
                if (!data || data.length === 0) return '?';
                for (const row of data) {
                    if (row.length > 1 && row[0] && row[0].includes(keyword)) {
                        return row[1] || '?';
                    }
                }
                return '?';
            }
            
            function extractNumberFromStaff(data, keyword) {
                if (!data || data.length === 0) return '?';
                for (const row of data) {
                    if (row.length > 1 && row[0] && row[0].includes(keyword)) {
                        return row[1] || '?';
                    }
                }
                return '?';
            }
            
            // =============================================
            // بناء HTML الكارت
            // =============================================
            
            let html = `
                <div class="details-popup" id="details-popup">
                    <div class="details-popup-header">
                        <button class="close-btn" onclick="closeDetails()">✕</button>
                        <h2>
                            <span class="hospital-icon">🏥</span>
                            ${hospitalName}
                        </h2>
                    </div>
                    
                    <div class="details-popup-body">
                        <div class="tabs">
                            <button class="tab-btn active" onclick="switchTab(event, 'tab-general')">📋 عام</button>
                            <button class="tab-btn" onclick="switchTab(event, 'tab-admin')">👔 الإدارة</button>
                            ${headsData.length > 0 ? `<button class="tab-btn" onclick="switchTab(event, 'tab-heads')">🩺 الأقسام</button>` : ''}
                            ${committeesData.length > 0 ? `<button class="tab-btn" onclick="switchTab(event, 'tab-committees')">📋 اللجان</button>` : ''}
                            ${systemsData.length > 0 ? `<button class="tab-btn" onclick="switchTab(event, 'tab-systems')">⚙️ التشغيل</button>` : ''}
                            ${staffData.length > 0 ? `<button class="tab-btn" onclick="switchTab(event, 'tab-staff')">👨‍⚕️ القوى</button>` : ''}
                            ${contractsData.length > 0 ? `<button class="tab-btn" onclick="switchTab(event, 'tab-contracts')">📄 العقود</button>` : ''}
                            ${gasData.length > 0 ? `<button class="tab-btn" onclick="switchTab(event, 'tab-gas')">💨 الغازات</button>` : ''}
                        </div>
            `;
            
            // =============================================
            // تبويب: معلومات عامة
            // =============================================
            html += `<div class="tab-content active" id="tab-general">`;
            
            // إحصائيات سريعة
            const numDoctors = extractNumber(staffData, 'طبيب بشرى') || extractNumber(staffData, 'طبيب') || '?';
            const numPharmacists = extractNumber(staffData, 'صيدلى') || '?';
            const numNurses = extractNumber(staffData, 'تمريض') || '?';
            const numElevators = extractNumber(systemsData, 'مصاعد') || '?';
            const numGenerators = extractNumber(systemsData, 'مولدات') || '?';
            const numCameras = extractNumber(systemsData, 'كاميرات') || '?';
            
            html += `
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="icon">👨‍⚕️</div>
                        <div class="number">${numDoctors}</div>
                        <div class="stat-label">الأطباء</div>
                    </div>
                    <div class="stat-item">
                        <div class="icon">💊</div>
                        <div class="number">${numPharmacists}</div>
                        <div class="stat-label">الصيادلة</div>
                    </div>
                    <div class="stat-item">
                        <div class="icon">🩺</div>
                        <div class="number">${numNurses}</div>
                        <div class="stat-label">التمريض</div>
                    </div>
                    <div class="stat-item">
                        <div class="icon">🏗️</div>
                        <div class="number">${numElevators}</div>
                        <div class="stat-label">المصاعد</div>
                    </div>
                    <div class="stat-item">
                        <div class="icon">⚡</div>
                        <div class="number">${numGenerators}</div>
                        <div class="stat-label">المولدات</div>
                    </div>
                    <div class="stat-item">
                        <div class="icon">📹</div>
                        <div class="number">${numCameras}</div>
                        <div class="stat-label">الكاميرات</div>
                    </div>
                </div>
            `;
            
            // الاعتمادات
            if (creditsData.length > 0) {
                html += `<div class="info-card">
                    <div class="label">📜 الاعتمادات</div>
                    <div class="value">`;
                creditsData.forEach(row => {
                    if (row.length > 1) {
                        html += `<span class="badge badge-success">${row.join(' | ')}</span> `;
                    }
                });
                html += `</div></div>`;
            }
            
            html += `</div>`;
            
            // =============================================
            // تبويب: الهيكل الإداري
            // =============================================
            html += `<div class="tab-content" id="tab-admin">`;
            if (adminData.length > 0) {
                html += `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>الوظيفة</th>
                                <th>الاسم</th>
                                <th>الهاتف</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                adminData.forEach(row => {
                    if (row.length >= 3) {
                        html += `<tr>
                            <td>${row[0] || ''}</td>
                            <td><strong>${row[2] || ''}</strong></td>
                            <td>${row[4] || ''}</td>
                        </tr>`;
                    }
                });
                html += `</tbody></table>`;
            } else {
                html += `<p style="color:#7a8a9e; text-align:center; padding:20px;">لا توجد بيانات</p>`;
            }
            html += `</div>`;
            
            // =============================================
            // تبويب: رؤساء الأقسام
            // =============================================
            if (headsData.length > 0) {
                html += `<div class="tab-content" id="tab-heads">`;
                html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
                headsData.forEach(row => {
                    if (row.length > 1 && row[0] && row[0].trim()) {
                        html += `<div class="info-card" style="border-right-color:#9b59b6;">
                            <div class="label">${row[0]}</div>
                            <div class="value">${row[1] || ''}</div>
                            ${row[3] ? `<div style="font-size:13px; color:#7a8a9e; margin-top:3px;">📞 ${row[3]}</div>` : ''}
                        </div>`;
                    }
                });
                html += `</div></div>`;
            }
            
            // =============================================
            // تبويب: اللجان
            // =============================================
            if (committeesData.length > 0) {
                html += `<div class="tab-content" id="tab-committees">`;
                committeesData.forEach(row => {
                    if (row.length > 0 && row[0] && row[0].trim()) {
                        const status = row[1] || '';
                        const isActive = status.includes('مفعل') || status.includes('ü');
                        html += `<div class="info-card" style="border-right-color:${isActive ? '#38a169' : '#e53e3e'};">
                            <div class="value">
                                ${row[0]}
                                <span class="badge ${isActive ? 'badge-success' : 'badge-danger'}">
                                    ${isActive ? '✅ مفعل' : '❌ غير مفعل'}
                                </span>
                            </div>
                            ${row[2] ? `<div style="font-size:13px; color:#7a8a9e; margin-top:3px;">${row[2]}</div>` : ''}
                        </div>`;
                    }
                });
                html += `</div>`;
            }
            
            // =============================================
            // تبويب: أنظمة التشغيل
            // =============================================
            if (systemsData.length > 0) {
                html += `<div class="tab-content" id="tab-systems">`;
                html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
                systemsData.forEach(row => {
                    if (row.length > 1 && row[0] && row[0].trim()) {
                        html += `<div class="info-card" style="border-right-color:#f39c12;">
                            <div class="label">${row[0]}</div>
                            <div class="value">${row[1] || ''}</div>
                        </div>`;
                    }
                });
                html += `</div></div>`;
            }
            
            // =============================================
            // تبويب: القوة البشرية
            // =============================================
            if (staffData.length > 0) {
                html += `<div class="tab-content" id="tab-staff">`;
                html += `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>البيان</th>
                                <th>العدد</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                staffData.forEach(row => {
                    if (row.length > 1 && row[0] && row[0].trim()) {
                        html += `<tr>
                            <td>${row[0]}</td>
                            <td><strong>${row[1] || ''}</strong></td>
                        </tr>`;
                    }
                });
                html += `</tbody></table></div>`;
            }
            
            // =============================================
            // تبويب: التعاقدات
            // =============================================
            if (contractsData.length > 0) {
                html += `<div class="tab-content" id="tab-contracts">`;
                contractsData.forEach(row => {
                    if (row.length > 1 && row[0] && row[0].trim()) {
                        const status = row[1] || '';
                        const isActive = status.includes('يوجد') || status.includes('نعم');
                        const date = row[3] || row[2] || '';
                        html += `<div class="contract-item" style="border-right:4px solid ${isActive ? '#38a169' : '#e53e3e'};">
                            <span class="name">${row[0]}</span>
                            <span class="badge ${isActive ? 'badge-success' : 'badge-danger'}">
                                ${isActive ? '✅ يوجد' : '❌ لا يوجد'}
                            </span>
                        </div>`;
                        if (date) {
                            html += `<div style="font-size:12px; color:#7a8a9e; padding:0 16px 10px 16px;">📅 ${date}</div>`;
                        }
                    }
                });
                html += `</div>`;
            }
            
            // =============================================
            // تبويب: شبكة الغازات
            // =============================================
            if (gasData.length > 0) {
                html += `<div class="tab-content" id="tab-gas">`;
                html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
                gasData.forEach(row => {
                    if (row.length > 1 && row[0] && row[0].trim()) {
                        html += `<div class="info-card" style="border-right-color:#e74c3c;">
                            <div class="label">${row[0]}</div>
                            <div class="value">${row[1] || ''}</div>
                        </div>`;
                    }
                });
                html += `</div></div>`;
            }
            
            // =============================================
            // إغلاق الكارت
            // =============================================
            html += `
                    </div>
                </div>
            `;
            
            // =============================================
            // الخلفية المعتمة
            // =============================================
            const overlay = document.createElement('div');
            overlay.className = 'details-overlay';
            overlay.id = 'details-overlay';
            overlay.addEventListener('click', closeDetails);
            
            // =============================================
            // إضافة الكارت للصفحة
            // =============================================
            const popupContainer = document.createElement('div');
            popupContainer.innerHTML = html;
            const popupElement = popupContainer.firstElementChild;
            
            document.body.appendChild(overlay);
            document.body.appendChild(popupElement);
        }

        // =============================================
        // التبديل بين التبويبات
        // =============================================
        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            const targetTab = document.getElementById(tabId);
            if (targetTab) {
                targetTab.classList.add('active');
            }
        }

        // =============================================
        // إغلاق الكارت
        // =============================================
        function closeDetails() {
            document.querySelector('.details-popup')?.remove();
            document.querySelector('.details-overlay')?.remove();
        }

        // =============================================
        // دوال مساعدة للرسائل
        // =============================================
        function showLoadingMessage(text) {
            const div = document.createElement('div');
            div.id = 'loading-message';
            div.style.cssText = `
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8); color: white; padding: 25px 50px;
                border-radius: 16px; z-index: 9999; text-align: center; font-size: 18px;
            `;
            div.innerHTML = `<div style="font-size:40px; margin-bottom:10px;">⏳</div><div>${text}</div>`;
            document.body.appendChild(div);
        }

        function hideLoadingMessage() {
            document.getElementById('loading-message')?.remove();
        }

        // =============================================
        // جعل الدوال عامة
        // =============================================
        window.showGovernorates = showGovernorates;
        window.showHospitals = showHospitals;
        window.showFullDetails = showFullDetails;
        window.closeDetails = closeDetails;
        window.switchTab = switchTab;

        // =============================================
        // بدء التطبيق
        // =============================================
        initMap();
        loadBasicData();

        console.log('🚀 تطبيق خريطة المستشفيات - النسخة المطورة');
        console.log('📡 جاري الاتصال بالسيرفر على /api');
    </script>
</body>
</html>
